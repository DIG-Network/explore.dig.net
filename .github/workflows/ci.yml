name: ci

# PR-gated CI: the SPEC listing gate, lint, typecheck, unit tests + coverage gate (≥80%), the
# production build (which re-validates listings + the dist sanity gate), and the accessibility/SEO
# Playwright suite. Runs on every PR and on push to main so main never goes red silently. Never
# deploys — deploy.yml handles that.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: explore-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: spec gate + lint + typecheck + unit + coverage + a11y
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: listing metadata + assets validate against SPEC.md (the submission gate)
        run: npm run validate:apps
      - name: lint
        run: npm run lint
      - name: typecheck
        run: npm run typecheck
      - name: unit tests + coverage (gated ≥80%)
        run: npm run test:coverage
      - name: build (catalog + SPA + prerender + dist sanity gate)
        run: npm run build
      - name: install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: a11y (axe / WCAG 2.2 AA) + SEO Playwright suite
        run: npm run test:a11y
      - name: upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
